<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Find the Key! ⌨️</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

  body {
    background: #0d0d2b;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }

  #stars-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .nav-btn {
    position: fixed; top: 10px; z-index: 20;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 10px; color: #fff;
    font-size: 1rem; padding: 5px 11px;
    cursor: pointer; font-family: inherit;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  #home-btn { right: 12px; }
  #mode-btn { left: 12px; }

  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 14px 0;
    text-align: center;
    font-size: clamp(12px, 3.5vw, 22px);
    color: #fff;
    text-shadow: 3px 3px 0 #000;
    pointer-events: none;
    z-index: 10;
  }
  #score { color: #FFD700; }

  #target-zone {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1;
  }

  #big-key {
    font-size: 40vmin;
    color: #FFD700;
    line-height: 1;
    text-shadow: 0 0 40px rgba(255,215,0,0.8), 0 0 80px rgba(255,215,0,0.4);
    animation: floatKey 2.4s ease-in-out infinite;
  }
  @keyframes floatKey {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-3vmin); }
  }
  #big-key.win {
    animation: popFly 0.9s ease-in forwards;
  }
  @keyframes popFly {
    0%   { transform: scale(1)   translateY(0);    opacity: 1; }
    30%  { transform: scale(1.3) translateY(0);    opacity: 1; }
    100% { transform: scale(1.5) translateY(-60vh); opacity: 0; }
  }

  #pressed-echo {
    margin-top: 4vmin;
    min-height: 10vmin;
    font-size: 8vmin;
    color: #FF69B4;
    text-shadow: 0 0 20px rgba(255,105,180,0.7);
  }
  #pressed-echo.shake { animation: shakeX 0.4s ease-in-out; }
  @keyframes shakeX {
    0%, 100% { transform: translateX(0); }
    20%      { transform: translateX(-14px); }
    40%      { transform: translateX(12px); }
    60%      { transform: translateX(-8px); }
    80%      { transform: translateX(6px); }
  }

  #mini-kb {
    position: fixed;
    bottom: 2vmin; left: 50%;
    transform: translateX(-50%);
    display: none;
    flex-direction: column;
    gap: 1vmin;
    z-index: 15;
    padding: 1.5vmin;
    background: rgba(8,8,36,0.85);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 14px;
  }
  #mini-kb.show { display: flex; }
  .kb-row { display: flex; gap: 0.8vmin; justify-content: center; }
  .kb-key {
    min-width: 52px; min-height: 52px;
    padding: 0 6px;
    font-family: inherit;
    font-size: 14px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .kb-key:active { transform: scale(0.9); }
  .kb-key.g-target {
    border-color: #FFD700 !important;
    box-shadow: 0 0 0 3px #FFD700, 0 0 20px rgba(255,215,0,0.8);
    background: rgba(255,215,0,0.15);
    animation: gPulse 0.5s ease-in-out infinite alternate;
  }
  .kb-key.g-dim { opacity: 0.28; animation: none !important; }
  @keyframes gPulse {
    from { transform: scale(1); }
    to   { transform: scale(1.13); }
  }


  .confetti-piece {
    position: fixed;
    width: 14px; height: 14px;
    border-radius: 3px;
    pointer-events: none;
    z-index: 40;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="stars-bg"></canvas>
<a id="home-btn" class="nav-btn" href="index.html">🏠</a>
<button id="mode-btn" class="nav-btn" onclick="toggleMode()">🔤 ABC</button>

<div id="hud">⭐ <span id="score">0</span></div>

<div id="target-zone">
  <div id="big-key">A</div>
  <div id="pressed-echo"></div>
</div>

<div id="mini-kb"></div>


<script>
// ── Starfield ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('stars-bg');
const ctx2 = canvas.getContext('2d');
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const stars = Array.from({length: 120}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 2 + 0.5,
  blink: Math.random() * Math.PI * 2
}));

function drawStars(ts) {
  ctx2.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    const alpha = 0.5 + 0.5 * Math.sin(s.blink + ts / 1000);
    ctx2.beginPath();
    ctx2.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
    ctx2.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx2.fill();
  });
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

// ── Audio ──────────────────────────────────────────────────────────────────
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, duration, type = 'sine', vol = 0.35) {
  const ac = getAudio();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ac.currentTime);
  gain.gain.setValueAtTime(vol, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
  osc.start(ac.currentTime);
  osc.stop(ac.currentTime + duration);
}

function playArpeggio() {
  [523, 659, 784].forEach((f, i) => setTimeout(() => playTone(f, 0.2, 'triangle', 0.4), i * 90));
}

function playCelebration() {
  const melody = [523, 659, 784, 1047];
  melody.forEach((f, i) => {
    setTimeout(() => playTone(f, 0.4, 'triangle', 0.5), i * 160);
  });
}

// ── Confetti ─────────────────────────────────────────────────────────────
function spawnConfetti(n = 80) {
  const colors = ['#ff4444','#44ff88','#4488ff','#ffff44','#ff44ff','#44ffff','#ff8844'];
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 40);
  }
}

// ── Text-to-speech ────────────────────────────────────────────────────────
const TTS_PROXY = 'https://tts.theo-games.chuve.co';

const idbReady = new Promise(res => {
  const r = indexedDB.open('tts-cache-v1', 1);
  r.onupgradeneeded = e => e.target.result.createObjectStore('audio');
  r.onsuccess = e => res(e.target.result);
  r.onerror   = () => res(null);
});
async function idbGet(key) {
  const db = await idbReady; if (!db) return null;
  return new Promise(res => { const r = db.transaction('audio').objectStore('audio').get(key); r.onsuccess = () => res(r.result ?? null); r.onerror = () => res(null); });
}
async function idbSet(key, val) {
  const db = await idbReady; if (!db) return;
  new Promise(res => { const tx = db.transaction('audio','readwrite'); tx.objectStore('audio').put(val, key); tx.oncomplete = res; });
}

function speakFallback(text) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.88; u.pitch = 1.1; u.volume = 1;
  const vv = window.speechSynthesis.getVoices();
  const pick = vv.find(v => v.lang.startsWith('en') && /samantha|karen|moira|zoe|victoria|female/i.test(v.name))
            || vv.find(v => v.lang.startsWith('en'));
  if (pick) u.voice = pick;
  window.speechSynthesis.speak(u);
}

function playAudioBuf(buf) {
  const ac = getAudio(), src = ac.createBufferSource();
  src.buffer = buf; src.connect(ac.destination); src.start();
  return src;
}

let currentSrc = null;
async function speak(text) {
  try { currentSrc && currentSrc.stop(); } catch(e) {}
  window.speechSynthesis.cancel();
  try {
    const stored = await idbGet(text);
    if (stored) { currentSrc = playAudioBuf(await getAudio().decodeAudioData(stored)); return; }
  } catch(e) {}
  try {
    const res = await fetch(`${TTS_PROXY}/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (!res.ok) throw new Error(res.status);
    const buf = await res.arrayBuffer();
    idbSet(text, buf.slice(0));
    currentSrc = playAudioBuf(await getAudio().decodeAudioData(buf));
  } catch(e) {
    speakFallback(text);
  }
}

// ── Praise pool (shared phrasing across games) ─────────────────────────────
const PRAISE = ['Great job!', "You found it!", 'Amazing!', 'Woohoo!'];
function randomPraise() { return PRAISE[Math.floor(Math.random() * PRAISE.length)]; }

// ── Game state ───────────────────────────────────────────────────────────
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const DIGITS  = '0123456789'.split('');

let mode    = localStorage.getItem('keyhunt-mode') || 'letters';
let started = false;
let target  = null;
let wrongCount   = 0;
let inputLocked  = false;
let idleTimer    = null;
let kbBuiltFor   = null;
let score   = 0;

const touchPermanent = window.matchMedia('(pointer: coarse)').matches;

function pool() {
  if (mode === 'letters') return LETTERS;
  if (mode === 'digits')  return DIGITS;
  return LETTERS.concat(DIGITS);
}
function isDigit(ch) { return /[0-9]/.test(ch); }
function promptPhrase(t)     { return isDigit(t)  ? `Find the number ${t}!`  : `Find the letter ${t}!`; }
function identityPhrase(ch)  { return isDigit(ch) ? `That's the number ${ch}!` : `That's the letter ${ch}!`; }

function updateModeBtn() {
  const btn = document.getElementById('mode-btn');
  btn.textContent = mode === 'letters' ? '🔤 ABC' : mode === 'digits' ? '🔢 123' : '🔀 A1';
}

function toggleMode() {
  mode = mode === 'letters' ? 'digits' : mode === 'digits' ? 'mixed' : 'letters';
  localStorage.setItem('keyhunt-mode', mode);
  updateModeBtn();
  kbBuiltFor = null;
  if (touchPermanent) buildMiniKb();
  if (started) { target = null; nextRound(); }
}

function buildMiniKb() {
  const kb = document.getElementById('mini-kb');
  if (kbBuiltFor === mode) { highlightTarget(); return; }
  kbBuiltFor = mode;
  kb.innerHTML = '';
  const rows = [];
  if (mode !== 'letters') rows.push('1234567890'.split(''));
  if (mode !== 'digits') {
    rows.push('QWERTYUIOP'.split(''));
    rows.push('ASDFGHJKL'.split(''));
    rows.push('ZXCVBNM'.split(''));
  }
  rows.forEach(r => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'kb-row';
    r.forEach(ch => {
      const b = document.createElement('button');
      b.className = 'kb-key';
      b.textContent = ch;
      b.dataset.key = ch;
      b.addEventListener('pointerdown', () => handleInput(ch));
      rowDiv.appendChild(b);
    });
    kb.appendChild(rowDiv);
  });
  highlightTarget();
}

function highlightTarget() {
  document.querySelectorAll('.kb-key').forEach(b => {
    const isT = b.dataset.key === target;
    b.classList.toggle('g-target', isT);
    b.classList.toggle('g-dim', !isT);
  });
}

function showHint() {
  buildMiniKb();
  document.getElementById('mini-kb').classList.add('show');
  playTone(880, 0.08, 'sine', 0.12);
}

function hideHint() {
  if (!touchPermanent) document.getElementById('mini-kb').classList.remove('show');
}

function armIdleHint() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(showHint, 8000);
}

function renderTarget() {
  const el = document.getElementById('big-key');
  el.classList.remove('win');
  void el.offsetWidth;
  el.textContent = target;
}

function nextRound() {
  inputLocked = true;
  clearTimeout(idleTimer);
  hideHint();
  document.getElementById('pressed-echo').textContent = '';
  const p = pool();
  let t;
  do { t = p[Math.floor(Math.random() * p.length)]; } while (t === target && p.length > 1);
  target = t;
  wrongCount = 0;
  renderTarget();
  if (touchPermanent) buildMiniKb();
  speak(promptPhrase(target));
  setTimeout(() => { inputLocked = false; armIdleHint(); }, 400);
}

function correct() {
  inputLocked = true;
  clearTimeout(idleTimer);
  playArpeggio();
  document.getElementById('big-key').classList.add('win');
  spawnConfetti(15);
  score++;
  document.getElementById('score').textContent = score;
  if (score % 5 === 0) {
    setTimeout(() => { spawnConfetti(80); playCelebration(); }, 150);
  }
  speak(randomPraise());
  setTimeout(nextRound, 1400);
}

function wrong(ch) {
  inputLocked = true;
  clearTimeout(idleTimer);
  wrongCount++;
  playTone(196, 0.3, 'sine', 0.18);
  const echo = document.getElementById('pressed-echo');
  echo.textContent = ch;
  echo.classList.remove('shake');
  void echo.offsetWidth;
  echo.classList.add('shake');
  speak(identityPhrase(ch));
  setTimeout(() => {
    if (wrongCount >= 2) showHint();
    speak(promptPhrase(target));
    inputLocked = false;
    armIdleHint();
  }, 1200);
}

function handleInput(ch) {
  if (inputLocked) return;
  if (!/^[A-Z0-9]$/.test(ch)) return;
  if (ch === target) correct();
  else wrong(ch);
}

document.addEventListener('keydown', e => {
  if (e.repeat || e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key.length !== 1) return;
  handleInput(e.key.toUpperCase());
});

// ── Start ────────────────────────────────────────────────────────────────
function startGame() {
  if (started) return;
  started = true;
  getAudio();
  nextRound();
}
// Auto-start; unlock audio on first user gesture (autoplay policy)
window.addEventListener('pointerdown', () => getAudio(), { once: true });
startGame();

// ── Init ─────────────────────────────────────────────────────────────────
updateModeBtn();
renderTarget();
</script>
</body>
</html>
