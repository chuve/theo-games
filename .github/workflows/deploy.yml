name: Deploy to Coolify

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment
        run: |
          curl -fsSL -X GET \
            "https://coolify.chuve.co/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
