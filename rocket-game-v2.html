<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Build Starship! 🚀</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

body {
  background: #070b1a;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#stars-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

#title {
  color: #fff;
  font-size: clamp(1.3rem, 4vw, 2.2rem);
  text-align: center;
  padding: 10px 0 2px;
  z-index: 1;
  text-shadow: 0 0 20px #88f;
  letter-spacing: 2px;
}

#home-btn {
  position: fixed;
  top: 10px; right: 12px;
  z-index: 20;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  color: #fff;
  font-size: 1.2rem;
  padding: 5px 11px;
  cursor: pointer;
  font-family: inherit;
  text-decoration: none;
  display: flex; align-items: center;
}

#game-area {
  position: relative;
  width: 100%;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 1;
  overflow: hidden;
}

#stage-wrapper {
  display: flex;
  justify-content: center;
  width: 100%;
  overflow: hidden;
}

/* Stage: 200×680 logical, scaled via CSS var */
#rocket-stage {
  position: relative;
  width: 200px;
  height: 680px;
  transform-origin: top center;
  transform: scale(var(--rs, 0.55));
  margin-bottom: calc((var(--rs, 0.55) - 1) * 680px);
  flex-shrink: 0;
}

.rocket-slot {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.3s;
}
.rocket-slot svg { display: block; filter: drop-shadow(0 0 3px rgba(255,255,255,0.12)); }
.rocket-slot.empty svg { opacity: 0.18; }
.rocket-slot.filled svg { opacity: 1; }
.rocket-slot.filled { animation: popIn 0.3s ease-out; }

@keyframes popIn {
  0%   { transform: scale(0.5); }
  70%  { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* pieces panel */
#pieces-area {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 12px 10px 14px;
  z-index: 1;
}

.piece-btn {
  position: relative;
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 14px;
  cursor: pointer;
  padding: 8px 8px;
  padding-top: 18px;
  transition: transform 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
  display: flex; align-items: center; justify-content: center;
}
.piece-btn:hover  { border-color: rgba(255,255,255,0.5); }
.piece-btn:active { transform: scale(0.87); }
.piece-btn.used   { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.piece-btn svg    { filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); display: block; }

.piece-num {
  position: absolute;
  top: -12px; left: 50%;
  transform: translateX(-50%);
  background: #ffdd00;
  color: #222;
  font-weight: bold;
  font-size: 1rem;
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  pointer-events: none;
}

.piece-btn:not(.used) { animation: bounce 1.8s ease-in-out infinite; }
.piece-btn:not(.used):nth-child(2) { animation-delay: 0.2s; }
.piece-btn:not(.used):nth-child(3) { animation-delay: 0.4s; }
.piece-btn:not(.used):nth-child(4) { animation-delay: 0.6s; }
.piece-btn:not(.used):nth-child(5) { animation-delay: 0.8s; }
.piece-btn:not(.used):nth-child(6) { animation-delay: 1.0s; }
.piece-btn:not(.used):nth-child(7) { animation-delay: 1.2s; }
.piece-btn:not(.used):nth-child(8) { animation-delay: 1.4s; }
.piece-btn:not(.used):nth-child(9) { animation-delay: 1.6s; }
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-6px); }
}

/* launch button */
#launch-btn {
  display: none;
  position: fixed;
  bottom: 34px; left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  padding: 18px 44px;
  font-size: clamp(1.4rem, 4vw, 2.2rem);
  border-radius: 60px;
  border: none;
  background: linear-gradient(135deg, #ff6600, #ff2200);
  color: #fff;
  cursor: pointer;
  font-family: inherit;
  font-weight: bold;
  box-shadow: 0 0 30px rgba(255,80,0,0.8), 0 8px 24px rgba(0,0,0,0.4);
  letter-spacing: 2px;
  white-space: nowrap;
}
#launch-btn.show { display: block; animation: launchPulse 0.8s ease-in-out infinite alternate; }
#launch-btn:active { transform: translateX(-50%) scale(0.93); }

@keyframes launchPulse {
  from { box-shadow: 0 0 20px rgba(255,80,0,0.6), 0 6px 20px rgba(0,0,0,0.4); }
  to   { box-shadow: 0 0 50px rgba(255,160,0,1),  0 8px 30px rgba(0,0,0,0.4); }
}

/* exhaust flame */
#exhaust {
  display: none;
  position: absolute;
  bottom: -100px; left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 4;
}
#exhaust.show {
  display: block;
  animation: exhaustFlicker 0.08s ease-in-out infinite alternate;
}
@keyframes exhaustFlicker {
  from { transform: translateX(-50%) scaleY(1)    scaleX(1); }
  to   { transform: translateX(-50%) scaleY(1.15) scaleX(0.9); }
}

/* celebration */
#celebration {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 10;
  align-items: center; justify-content: center; flex-direction: column;
}
#celebration.show { display: flex; }
#celebration h2 {
  color: #fff;
  font-size: clamp(2rem, 7vw, 4.5rem);
  text-shadow: 0 0 30px #ff0, 0 0 60px #f80;
  animation: zoomPulse 0.6s ease-in-out infinite alternate;
  text-align: center; padding: 0 20px;
}
@keyframes zoomPulse {
  from { transform: scale(1); }
  to   { transform: scale(1.08); }
}
#play-again {
  margin-top: 28px;
  padding: 16px 40px;
  font-size: 1.4rem;
  border-radius: 50px; border: none;
  background: linear-gradient(135deg, #f80, #f40);
  color: #fff; cursor: pointer;
  font-family: inherit; font-weight: bold;
  box-shadow: 0 6px 20px rgba(255,100,0,0.5);
  letter-spacing: 1px;
}
#play-again:active { transform: scale(0.92); }

.confetti-piece {
  position: fixed;
  width: 12px; height: 12px;
  border-radius: 3px;
  pointer-events: none; z-index: 11;
  animation: fall linear forwards;
}
@keyframes fall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

.nav-btn {
  position: fixed; top: 10px; z-index: 20;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 10px; color: #fff;
  font-size: 1rem; padding: 5px 11px;
  cursor: pointer; font-family: inherit;
}
#mode-btn { left: 12px; }
#mode-btn.active { background: rgba(255,221,0,0.18); border-color: #ffdd00; color: #ffdd00; }

.piece-btn.g-target {
  border-color: #ffdd00 !important;
  box-shadow: 0 0 0 3px #ffdd00, 0 0 26px rgba(255,221,0,0.85) !important;
  animation: gPulse 0.5s ease-in-out infinite alternate !important;
}
.piece-btn.g-dim { opacity: 0.22 !important; animation: none !important; }
@keyframes gPulse {
  from { transform: scale(1); }
  to   { transform: scale(1.13); }
}
</style>

<script>
// ── Starfield ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('stars-bg');
const ctx2   = canvas.getContext('2d');
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); updateScale(); });

const stars = Array.from({length: 130}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 2 + 0.5,
  blink: Math.random() * Math.PI * 2
}));
function drawStars(ts) {
  ctx2.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    const a = 0.4 + 0.5 * Math.sin(s.blink + ts / 1000);
    ctx2.beginPath();
    ctx2.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
    ctx2.fillStyle = `rgba(255,255,255,${a.toFixed(2)})`;
    ctx2.fill();
  });
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

// ── Scale ─────────────────────────────────────────────────────────────────
const STAGE_H = 680;
function updateScale() {
  const available = window.innerHeight - 55 - 130;
  const s = Math.min(0.96, Math.max(0.28, available / STAGE_H));
  document.documentElement.style.setProperty('--rs', s.toFixed(3));
}
updateScale();

// ── Audio ─────────────────────────────────────────────────────────────────
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playTone(freq, duration, type = 'sine', vol = 0.35) {
  const ac = getAudio();
  const osc = ac.createOscillator(); const gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  osc.type = type; osc.frequency.setValueAtTime(freq, ac.currentTime);
  gain.gain.setValueAtTime(vol, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
  osc.start(ac.currentTime); osc.stop(ac.currentTime + duration);
}
function playPlaceSound(index) {
  const notes = [261, 294, 330, 349, 392, 440, 494, 523, 587];
  playTone(notes[index % notes.length], 0.25, 'triangle', 0.4);
}
function playRocketSound() {
  const ac = getAudio(); const dur = 2.2;
  // brown noise rumble
  const buf1 = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const d1 = buf1.getChannelData(0); let last = 0;
  for (let i = 0; i < d1.length; i++) { const w = Math.random()*2-1; last = (last + 0.04*w)/1.04; d1[i] = last*4; }
  const rumble = ac.createBufferSource(); rumble.buffer = buf1;
  const lp = ac.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.setValueAtTime(120, ac.currentTime);
  lp.frequency.exponentialRampToValueAtTime(900, ac.currentTime + dur);
  const gR = ac.createGain();
  gR.gain.setValueAtTime(0, ac.currentTime);
  gR.gain.linearRampToValueAtTime(0.9, ac.currentTime + 0.15);
  gR.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  rumble.connect(lp); lp.connect(gR); gR.connect(ac.destination); rumble.start();
  // whoosh
  const buf2 = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const d2 = buf2.getChannelData(0);
  for (let i = 0; i < d2.length; i++) d2[i] = Math.random()*2-1;
  const whoosh = ac.createBufferSource(); whoosh.buffer = buf2;
  const bp = ac.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.setValueAtTime(200, ac.currentTime);
  bp.frequency.exponentialRampToValueAtTime(6000, ac.currentTime + dur);
  bp.Q.value = 0.8;
  const gW = ac.createGain();
  gW.gain.setValueAtTime(0.4, ac.currentTime);
  gW.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  whoosh.connect(bp); bp.connect(gW); gW.connect(ac.destination); whoosh.start();
  // ignition thud
  const osc = ac.createOscillator(); osc.type = 'sine';
  osc.frequency.setValueAtTime(80, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(30, ac.currentTime + 0.4);
  const gT = ac.createGain();
  gT.gain.setValueAtTime(0.7, ac.currentTime);
  gT.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
  osc.connect(gT); gT.connect(ac.destination); osc.start(); osc.stop(ac.currentTime + 0.4);
}

let placed    = new Set();
let pieceKeyMap = {};

// ── Render ────────────────────────────────────────────────────────────────
function renderStage() {
  const stage   = document.getElementById('rocket-stage');
  const exhaust = document.getElementById('exhaust');
  stage.innerHTML = '';
  stage.appendChild(exhaust);
  PIECES.forEach(p => {
    const s   = p.slot;
    const div = document.createElement('div');
    div.className = 'rocket-slot ' + (placed.has(p.id) ? 'filled' : 'empty');
    div.id        = 'slot-' + p.id;
    div.style.cssText = `left:${s.left}px;top:${s.top}px;width:${s.w}px;height:${s.h}px;`;
    div.innerHTML = `<svg width="${s.w}" height="${s.h}" viewBox="${p.viewBox}">${p.svg}</svg>`;
    stage.appendChild(div);
  });
}

function renderPieces() {
  const area = document.getElementById('pieces-area');
  area.innerHTML = '';
  pieceKeyMap = {};
  const shuffled = [...PIECES].sort(() => Math.random() - 0.5);
  shuffled.forEach((p, i) => {
    const num = i + 1;
    pieceKeyMap[num] = p.id;
    const btn = document.createElement('button');
    btn.className = 'piece-btn' + (placed.has(p.id) ? ' used' : '');
    btn.id = 'piece-' + p.id;
    btn.setAttribute('aria-label', `${num}: ${p.label}`);
    const targetH = 90;
    const vb = p.viewBox.split(' ').map(Number);
    const w = Math.round(vb[2] * (targetH / vb[3]));
    btn.innerHTML = `<svg width="${w}" height="${targetH}" viewBox="${p.viewBox}">${p.svg}</svg>`;
    const badge = document.createElement('div');
    badge.className = 'piece-num';
    badge.textContent = num;
    btn.appendChild(badge);
    btn.onclick = () => placePiece(p.id);
    area.appendChild(btn);
  });

  if (guidedMode) {
    startGuidedSeq();
    applyGuidedHighlight();
    setTimeout(speakTarget, 700);
  }
}

document.addEventListener('keydown', e => {
  const num = parseInt(e.key);
  if (num >= 1 && num <= 9 && pieceKeyMap[num]) placePiece(pieceKeyMap[num]);
});

// ── Game logic ────────────────────────────────────────────────────────────
function placePiece(id) {
  if (placed.has(id)) return;

  if (guidedMode && id !== guidedSeq[guidedIdx]) {
    const btn = document.getElementById('piece-' + id);
    if (btn) {
      btn.style.borderColor = '#ff4444';
      btn.style.boxShadow   = '0 0 18px rgba(255,68,68,0.9)';
      setTimeout(() => { btn.style.borderColor = ''; btn.style.boxShadow = ''; }, 500);
    }
    playTone(160, 0.28, 'sawtooth', 0.3);
    return;
  }

  if (guidedMode) guidedIdx++;
  placed.add(id);

  const slot = document.getElementById('slot-' + id);
  if (slot) {
    slot.className = 'rocket-slot filled';
    slot.style.animation = 'none';
    void slot.offsetWidth;
    slot.style.animation = '';
  }

  const btn = document.getElementById('piece-' + id);
  if (btn) btn.classList.add('used');

  playPlaceSound(placed.size - 1);
  if (placed.size === PIECES.length) {
    setTimeout(showLaunchButton, 400);
  } else if (guidedMode) {
    setTimeout(() => { applyGuidedHighlight(); speakTarget(); }, 380);
  }
}

function showLaunchButton() {
  [523, 659, 784].forEach((f, i) => setTimeout(() => playTone(f, 0.25, 'triangle', 0.4), i * 120));
  document.getElementById('pieces-area').style.pointerEvents = 'none';
  document.getElementById('launch-btn').classList.add('show');
}

function launchRocket() {
  document.getElementById('launch-btn').classList.remove('show');
  document.getElementById('exhaust').classList.add('show');
  playRocketSound();

  // Inject keyframes using the current scale value
  const s = getComputedStyle(document.documentElement).getPropertyValue('--rs').trim() || '0.55';
  let dynStyle = document.getElementById('dyn-anim');
  if (!dynStyle) { dynStyle = document.createElement('style'); dynStyle.id = 'dyn-anim'; document.head.appendChild(dynStyle); }
  dynStyle.textContent = `@keyframes rocketFlyV2 {
    0%   { transform: scale(${s}) translateY(0); }
    12%  { transform: scale(${s}) translateY(12px); }
    100% { transform: scale(${s}) translateY(-220vh); }
  }`;

  const stage = document.getElementById('rocket-stage');
  stage.style.animation = 'none'; void stage.offsetWidth;
  stage.style.animation = 'rocketFlyV2 1.8s ease-in forwards';
  stage.style.pointerEvents = 'none';

  setTimeout(() => {
    document.getElementById('exhaust').classList.remove('show');
    spawnConfetti();
    document.getElementById('celebration').classList.add('show');
    playCelebration();
  }, 1800);
}

function playCelebration() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.4, 'triangle', 0.5), i * 160));
}

// ── Guided Mode ───────────────────────────────────────────────────────────
const ELEVEN_KEY   = 'REMOVED';
const ELEVEN_VOICE = 'ErXwobaYiN019PkySvjV'; // Antoni

const idbReady = new Promise(res => {
  const r = indexedDB.open('tts-cache-v1', 1);
  r.onupgradeneeded = e => e.target.result.createObjectStore('audio');
  r.onsuccess = e => res(e.target.result);
  r.onerror   = () => res(null);
});
async function idbGet(key) {
  const db = await idbReady; if (!db) return null;
  return new Promise(res => { const r = db.transaction('audio').objectStore('audio').get(key); r.onsuccess = () => res(r.result ?? null); r.onerror = () => res(null); });
}
async function idbSet(key, val) {
  const db = await idbReady; if (!db) return;
  new Promise(res => { const tx = db.transaction('audio','readwrite'); tx.objectStore('audio').put(val, key); tx.oncomplete = res; });
}

let guidedMode = false;
let guidedSeq  = [];
let guidedIdx  = 0;

function toggleMode() {
  guidedMode = !guidedMode;
  const btn = document.getElementById('mode-btn');
  btn.textContent = guidedMode ? '🎯 ON' : '🎯 Guided';
  btn.classList.toggle('active', guidedMode);
  resetGame();
}

function startGuidedSeq() {
  guidedSeq = [...PIECES].map(p => p.id).sort(() => Math.random() - 0.5);
  guidedIdx = 0;
}

function getTargetNum() {
  const id = guidedSeq[guidedIdx];
  for (const [n, pid] of Object.entries(pieceKeyMap)) { if (pid === id) return n; }
  return '?';
}

function applyGuidedHighlight() {
  PIECES.forEach(p => {
    const btn = document.getElementById('piece-' + p.id);
    if (!btn || btn.classList.contains('used')) return;
    const isTarget = p.id === guidedSeq[guidedIdx];
    btn.classList.toggle('g-target', isTarget);
    btn.classList.toggle('g-dim',    !isTarget);
  });
}

function speakFallback(text) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.88; u.pitch = 1.1; u.volume = 1;
  const vv = window.speechSynthesis.getVoices();
  const pick = vv.find(v => v.lang.startsWith('en') && /samantha|karen|moira|zoe|victoria|female/i.test(v.name))
            || vv.find(v => v.lang.startsWith('en'));
  if (pick) u.voice = pick;
  window.speechSynthesis.speak(u);
}

function playAudioBuf(buf) {
  const ac = getAudio(), src = ac.createBufferSource();
  src.buffer = buf; src.connect(ac.destination); src.start();
}

async function speakTarget() {
  if (!guidedMode || guidedIdx >= guidedSeq.length) return;
  const piece = PIECES.find(p => p.id === guidedSeq[guidedIdx]);
  const num   = getTargetNum();
  const text  = `Press number ${num}`;

  // Check IndexedDB first
  try {
    const stored = await idbGet(text);
    if (stored) {
      playAudioBuf(await getAudio().decodeAudioData(stored));
      return;
    }
  } catch(e) {}

  // Fetch from ElevenLabs and persist
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVEN_VOICE}`, {
      method: 'POST',
      headers: { 'Accept': 'audio/mpeg', 'Content-Type': 'application/json', 'xi-api-key': ELEVEN_KEY },
      body: JSON.stringify({ text, model_id: 'eleven_turbo_v2', voice_settings: { stability: 0.5, similarity_boost: 0.75 } })
    });
    if (!res.ok) throw new Error(res.status);
    const arrayBuf = await res.arrayBuffer();
    idbSet(text, arrayBuf.slice(0));
    playAudioBuf(await getAudio().decodeAudioData(arrayBuf));
  } catch(e) {
    speakFallback(text);
  }
}

function spawnConfetti() {
  const colors = ['#ff4444','#44ff88','#4488ff','#ffff44','#ff44ff','#44ffff','#ff8844'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 40);
  }
}

function resetGame() {
  placed.clear();
  guidedIdx = 0;
  document.getElementById('celebration').classList.remove('show');
  document.getElementById('launch-btn').classList.remove('show');
  document.getElementById('pieces-area').style.pointerEvents = '';
  const stage = document.getElementById('rocket-stage');
  stage.style.animation = 'none';
  stage.style.pointerEvents = '';
  void stage.offsetWidth;
  renderStage();
  renderPieces();
}

// ── Init ──────────────────────────────────────────────────────────────────
renderStage();
renderPieces();
