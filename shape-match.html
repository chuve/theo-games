<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Match the Rocket! 🚀</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

  body {
    background: #0d0d2b;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #stars-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .nav-btn {
    position: fixed; top: 10px; z-index: 20;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 10px; color: #fff;
    font-size: 1rem; padding: 5px 11px;
    cursor: pointer; font-family: inherit;
    text-decoration: none; display: inline-flex; align-items: center;
  }
  #home-btn     { right: 12px; }
  #settings-btn { left: 12px; }

  #settings-panel {
    display: none;
    position: fixed;
    top: 54px; left: 12px;
    background: rgba(8,8,36,0.97);
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 8px;
    padding: 18px 18px 14px;
    z-index: 30;
    color: #fff;
    width: 230px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  #settings-panel.open { display: block; }
  #settings-panel .section-label {
    font-size: 7px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 2px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  #settings-panel .row { display: flex; align-items: center; gap: 12px; }
  #opt-slider { flex: 1; height: 4px; accent-color: #FFD700; cursor: pointer; }
  #opt-val {
    font-size: 16px; color: #FFD700; min-width: 20px;
    text-align: right; text-shadow: 0 0 8px rgba(255,215,0,0.5);
  }

  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 14px 0;
    text-align: center;
    font-size: clamp(12px, 3.5vw, 22px);
    color: #fff;
    text-shadow: 3px 3px 0 #000;
    pointer-events: none;
    z-index: 10;
  }
  #score { color: #FFD700; }

  #game-area {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    z-index: 1;
  }

  #question {
    margin-top: 9vmin;
    font-size: clamp(13px, 3.6vw, 24px);
    color: #fff;
    text-align: center;
    padding: 0 4vw;
    text-shadow: 3px 3px 0 #000;
  }

  /* Target rocket to match */
  #target {
    margin-top: 2.4vmin;
    width: 22vmin;
    max-width: 150px;
    filter: drop-shadow(0 0 14px rgba(120,160,255,0.55));
    animation: floaty 3s ease-in-out infinite;
  }
  #target svg { width: 100%; height: auto; display: block; }
  #target.paused { animation: none; }
  #target.hidden { visibility: hidden; }
  @keyframes floaty {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-1.6vmin); }
  }

  /* Rocket clone that flies from an option to the target */
  .flyer { position: fixed; margin: 0; z-index: 45; pointer-events: none;
           filter: drop-shadow(0 0 14px rgba(120,160,255,0.55)); }
  .flyer.ignite { animation: ignite 0.4s ease-in-out; }
  @keyframes ignite {
    0%,100% { filter: drop-shadow(0 0 14px rgba(120,160,255,0.55)); }
    50%     { filter: drop-shadow(0 6px 26px rgba(255,150,40,0.95)); }
  }

  /* Options row */
  #options {
    display: flex;
    flex-wrap: nowrap;
    justify-content: center;
    align-items: flex-end;
    gap: 1.6vmin;
    padding: 3vmin 3vw 4vmin;
    margin-top: auto;
    margin-bottom: 3vmin;
    width: 100%;
    max-width: 760px;
  }
  .opt {
    position: relative;
    flex: 1 1 0;
    min-width: 0;
    max-width: 160px;
    background: rgba(255,255,255,0.06);
    border: 3px solid rgba(255,255,255,0.22);
    border-radius: 16px;
    padding: 10px 8px 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s, border-color 0.12s, background 0.12s;
  }
  .opt svg { width: 100%; height: auto; display: block; pointer-events: none; }
  .opt:active { transform: scale(0.93); }
  .opt.correct-pick {
    border-color: #ADFF2F;
    background: rgba(173,255,47,0.14);
    animation: pop 0.5s ease-out;
  }
  .opt.wrong-pick {
    border-color: #ff5566;
    animation: shake 0.4s;
  }
  .opt.hint {
    border-color: #FFD700;
    animation: hintPulse 0.7s ease-in-out infinite;
  }
  .opt .badge {
    position: absolute;
    top: -14px; left: 50%;
    transform: translateX(-50%);
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #0d0d2b;
    border: 3px solid rgba(255,255,255,0.35);
    color: #fff;
    font-size: 11px;
    display: flex; align-items: center; justify-content: center;
  }
  @keyframes pop {
    0% { transform: scale(1); } 45% { transform: scale(1.16); } 100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); } 75% { transform: translateX(6px); }
  }
  @keyframes hintPulse {
    0%,100% { border-color: #FFD700; box-shadow: 0 0 0 rgba(255,215,0,0); }
    50%     { border-color: #fff;    box-shadow: 0 0 18px rgba(255,215,0,0.7); }
  }


  .confetti-piece {
    position: fixed;
    width: 14px; height: 14px;
    border-radius: 3px;
    pointer-events: none;
    z-index: 40;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="stars-bg"></canvas>
<a id="home-btn" class="nav-btn" href="index.html">🏠</a>
<button id="settings-btn" class="nav-btn">⚙️</button>

<div id="settings-panel">
  <div class="section-label">How Many Choices</div>
  <div class="row">
    <input id="opt-slider" type="range" min="2" max="4" value="4">
    <span id="opt-val">4</span>
  </div>
</div>

<div id="hud">⭐ <span id="score">0</span></div>

<div id="game-area">
  <div id="question">Which rocket looks like this?</div>
  <div id="target"></div>
  <div id="options"></div>
</div>


<script>
// ── Starfield ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('stars-bg');
const ctx2 = canvas.getContext('2d');
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const stars = Array.from({length: 120}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 2 + 0.5,
  blink: Math.random() * Math.PI * 2
}));

function drawStars(ts) {
  ctx2.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    const alpha = 0.5 + 0.5 * Math.sin(s.blink + ts / 1000);
    ctx2.beginPath();
    ctx2.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
    ctx2.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx2.fill();
  });
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

// ── Audio ──────────────────────────────────────────────────────────────────
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, duration, type = 'sine', vol = 0.35) {
  const ac = getAudio();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ac.currentTime);
  gain.gain.setValueAtTime(vol, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
  osc.start(ac.currentTime);
  osc.stop(ac.currentTime + duration);
}

function playArpeggio() {
  [523, 659, 784].forEach((f, i) => setTimeout(() => playTone(f, 0.2, 'triangle', 0.4), i * 90));
}

function playCelebration() {
  const melody = [523, 659, 784, 1047];
  melody.forEach((f, i) => {
    setTimeout(() => playTone(f, 0.4, 'triangle', 0.5), i * 160);
  });
}

// Rocket lift-off: filtered-noise rumble + rising whistle.
function playLaunch() {
  const ac = getAudio();
  const t0 = ac.currentTime;
  const dur = 1.6;

  // Rumble (white noise through a downward-sweeping low-pass)
  const size = Math.floor(ac.sampleRate * dur);
  const buffer = ac.createBuffer(1, size, ac.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
  const noise = ac.createBufferSource(); noise.buffer = buffer;
  const lp = ac.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.setValueAtTime(500, t0);
  lp.frequency.exponentialRampToValueAtTime(120, t0 + dur);
  const ng = ac.createGain();
  ng.gain.setValueAtTime(0.0001, t0);
  ng.gain.exponentialRampToValueAtTime(0.5, t0 + 0.18);
  ng.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  noise.connect(lp); lp.connect(ng); ng.connect(ac.destination);
  noise.start(t0); noise.stop(t0 + dur);

  // Rising whistle
  const osc = ac.createOscillator(); osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(180, t0);
  osc.frequency.exponentialRampToValueAtTime(900, t0 + dur * 0.85);
  const og = ac.createGain();
  og.gain.setValueAtTime(0.0001, t0);
  og.gain.exponentialRampToValueAtTime(0.16, t0 + 0.3);
  og.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(og); og.connect(ac.destination);
  osc.start(t0); osc.stop(t0 + dur);
}

// ── Confetti ─────────────────────────────────────────────────────────────
function spawnConfetti(n = 80) {
  const colors = ['#ff4444','#44ff88','#4488ff','#ffff44','#ff44ff','#44ffff','#ff8844'];
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 40);
  }
}

// ── Text-to-speech ────────────────────────────────────────────────────────
const TTS_PROXY = 'https://tts.theo-games.chuve.co';

const idbReady = new Promise(res => {
  const r = indexedDB.open('tts-cache-v1', 1);
  r.onupgradeneeded = e => e.target.result.createObjectStore('audio');
  r.onsuccess = e => res(e.target.result);
  r.onerror   = () => res(null);
});
async function idbGet(key) {
  const db = await idbReady; if (!db) return null;
  return new Promise(res => { const r = db.transaction('audio').objectStore('audio').get(key); r.onsuccess = () => res(r.result ?? null); r.onerror = () => res(null); });
}
async function idbSet(key, val) {
  const db = await idbReady; if (!db) return;
  new Promise(res => { const tx = db.transaction('audio','readwrite'); tx.objectStore('audio').put(val, key); tx.oncomplete = res; });
}

function speakFallback(text) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.88; u.pitch = 1.1; u.volume = 1;
  const vv = window.speechSynthesis.getVoices();
  const pick = vv.find(v => v.lang.startsWith('en') && /samantha|karen|moira|zoe|victoria|female/i.test(v.name))
            || vv.find(v => v.lang.startsWith('en'));
  if (pick) u.voice = pick;
  window.speechSynthesis.speak(u);
}

function playAudioBuf(buf) {
  const ac = getAudio(), src = ac.createBufferSource();
  src.buffer = buf; src.connect(ac.destination); src.start();
  return src;
}

let currentSrc = null;
async function speak(text) {
  try { currentSrc && currentSrc.stop(); } catch(e) {}
  window.speechSynthesis.cancel();
  try {
    const stored = await idbGet(text);
    if (stored) { currentSrc = playAudioBuf(await getAudio().decodeAudioData(stored)); return; }
  } catch(e) {}
  try {
    const res = await fetch(`${TTS_PROXY}/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (!res.ok) throw new Error(res.status);
    const buf = await res.arrayBuffer();
    idbSet(text, buf.slice(0));
    currentSrc = playAudioBuf(await getAudio().decodeAudioData(buf));
  } catch(e) {
    speakFallback(text);
  }
}

// ── Praise pool ─────────────────────────────────────────────────────────
const PRAISE = ['Great job!', "You found it!", 'Amazing!', 'Woohoo!', "That's the one!"];
function randomPraise() { return PRAISE[Math.floor(Math.random() * PRAISE.length)]; }

// ── Rocket shapes ─────────────────────────────────────────────────────────
// All rockets share one colour so the game tests SHAPE, not colour.
const RKT_FILL   = '#cdddff';
const RKT_STROKE = '#6f8fd8';
const WIN_FILL   = '#3a4a78';
const FLAME_FILL = '#ffb347';
const FLAME_LINE = '#ff8c00';

// 20 distinct rocket shapes. Each varies by nose (point/needle/round/dome),
// fins (none/small/tall) and body width. Every rocket has a nose.
const ROCKETS = [
  { nose: 'point',  fins: 'none',  bodyW: 34 },
  { nose: 'point',  fins: 'small', bodyW: 40 },
  { nose: 'point',  fins: 'tall',  bodyW: 46 },
  { nose: 'point',  fins: 'small', bodyW: 54 },
  { nose: 'point',  fins: 'tall',  bodyW: 36 },
  { nose: 'needle', fins: 'none',  bodyW: 30 },
  { nose: 'needle', fins: 'small', bodyW: 36 },
  { nose: 'needle', fins: 'small', bodyW: 46 },
  { nose: 'needle', fins: 'tall',  bodyW: 42 },
  { nose: 'round',  fins: 'none',  bodyW: 36 },
  { nose: 'round',  fins: 'none',  bodyW: 52 },
  { nose: 'round',  fins: 'small', bodyW: 46 },
  { nose: 'round',  fins: 'small', bodyW: 36 },
  { nose: 'round',  fins: 'tall',  bodyW: 54 },
  { nose: 'dome',   fins: 'none',  bodyW: 44 },
  { nose: 'dome',   fins: 'none',  bodyW: 54 },
  { nose: 'dome',   fins: 'small', bodyW: 40 },
  { nose: 'dome',   fins: 'small', bodyW: 50 },
  { nose: 'dome',   fins: 'tall',  bodyW: 46 },
  { nose: 'point',  fins: 'none',  bodyW: 48 },
];

// Two shapes read as "different" if the nose, the fins, or the width differ clearly.
function distinct(a, b) {
  return a.nose !== b.nose || a.fins !== b.fins || Math.abs(a.bodyW - b.bodyW) >= 12;
}

function rocketSVG(v) {
  const cx = 50;
  const bw = v.bodyW;
  const left = cx - bw / 2;
  const right = cx + bw / 2;
  const bodyBottom = 128;
  const bodyTop = 60;
  const P = [];

  // Fins (drawn behind the body): 'small' or 'tall'
  if (v.fins && v.fins !== 'none') {
    const tall = v.fins === 'tall';
    const finTop = bodyBottom - (tall ? 48 : 34);
    const out    = tall ? 22 : 18;
    const drop   = tall ? 10 : 6;
    P.push(`<path d="M${left} ${finTop} L${left - out} ${bodyBottom + drop} L${left} ${bodyBottom} Z" fill="${RKT_FILL}" stroke="${RKT_STROKE}" stroke-width="3" stroke-linejoin="round"/>`);
    P.push(`<path d="M${right} ${finTop} L${right + out} ${bodyBottom + drop} L${right} ${bodyBottom} Z" fill="${RKT_FILL}" stroke="${RKT_STROKE}" stroke-width="3" stroke-linejoin="round"/>`);
  }

  // Flames (behind the body base)
  P.push(`<path d="M${cx - 15} ${bodyBottom - 4} Q ${cx - 9} ${bodyBottom + 22} ${cx} ${bodyBottom + 12} Q ${cx + 9} ${bodyBottom + 26} ${cx + 15} ${bodyBottom - 4} Z" fill="${FLAME_FILL}" stroke="${FLAME_LINE}" stroke-width="2.5" stroke-linejoin="round"/>`);

  // Body + nose as one silhouette path
  let nose;
  if (v.nose === 'point') {
    nose = `L${left} ${bodyTop} L${cx} ${bodyTop - 46} L${right} ${bodyTop}`;
  } else if (v.nose === 'needle') {
    nose = `L${left} ${bodyTop} L${cx} ${bodyTop - 56} L${right} ${bodyTop}`;
  } else if (v.nose === 'round') {
    nose = `L${left} ${bodyTop} C${left} ${bodyTop - 48} ${right} ${bodyTop - 48} ${right} ${bodyTop}`;
  } else if (v.nose === 'dome') {
    nose = `L${left} ${bodyTop} C${left - 4} ${bodyTop - 30} ${right + 4} ${bodyTop - 30} ${right} ${bodyTop}`;
  } else { // flat (unused fallback)
    nose = `L${left} ${bodyTop} L${right} ${bodyTop}`;
  }
  P.push(`<path d="M${left} ${bodyBottom} ${nose} L${right} ${bodyBottom} Z" fill="${RKT_FILL}" stroke="${RKT_STROKE}" stroke-width="3.5" stroke-linejoin="round"/>`);

  // Window (identical on every rocket)
  P.push(`<circle cx="${cx}" cy="92" r="8.5" fill="${WIN_FILL}" stroke="${RKT_STROKE}" stroke-width="2.5"/>`);

  return `<svg viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg">${P.join('')}</svg>`;
}

// ── Settings panel ─────────────────────────────────────────────────────
let optionCount = parseInt(localStorage.getItem('shape-options'), 10) || 4;
optionCount = Math.min(4, Math.max(2, optionCount));
const slider   = document.getElementById('opt-slider');
const optValEl = document.getElementById('opt-val');
slider.value = optionCount;
optValEl.textContent = optionCount;

document.getElementById('settings-btn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('settings-panel').classList.toggle('open');
});
document.addEventListener('click', e => {
  const panel = document.getElementById('settings-panel');
  if (!panel.contains(e.target)) panel.classList.remove('open');
});
slider.addEventListener('input', () => {
  optionCount = parseInt(slider.value, 10);
  optValEl.textContent = optionCount;
  localStorage.setItem('shape-options', optionCount);
});

// ── Game state ───────────────────────────────────────────────────────────
let started      = false;
let targetIdx     = null;   // index into ROCKETS for the answer
let correctSlot   = null;   // which option tile holds the answer
let prevTarget    = null;
let wrongCount    = 0;
let inputLocked   = false;
let score         = 0;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function nextRound() {
  inputLocked = true;

  // Pick target (avoid repeating the previous one)
  let t;
  do { t = Math.floor(Math.random() * ROCKETS.length); }
  while (t === prevTarget && ROCKETS.length > 1);
  targetIdx = t;
  prevTarget = t;
  wrongCount = 0;

  // Build option set: the answer + distractors that each look clearly
  // different from the answer AND from every other chosen tile.
  const pool = shuffle(ROCKETS.map((_, i) => i).filter(i => i !== targetIdx));
  const chosen = [targetIdx];
  for (const i of pool) {
    if (chosen.length >= optionCount) break;
    if (chosen.every(j => distinct(ROCKETS[i], ROCKETS[j]))) chosen.push(i);
  }
  // Fallback (shouldn't trigger with 20 shapes): fill any remaining slots.
  for (const i of pool) {
    if (chosen.length >= optionCount) break;
    if (!chosen.includes(i)) chosen.push(i);
  }
  shuffle(chosen);
  correctSlot = chosen.indexOf(targetIdx);

  // Render target (restore visibility + floaty bob from any prior launch)
  const targetEl = document.getElementById('target');
  targetEl.classList.remove('hidden', 'paused');
  targetEl.innerHTML = rocketSVG(ROCKETS[targetIdx]);

  // Render options
  const optWrap = document.getElementById('options');
  optWrap.innerHTML = '';
  chosen.forEach((rIdx, slot) => {
    const btn = document.createElement('div');
    btn.className = 'opt';
    btn.dataset.slot = slot;
    btn.dataset.rocket = rIdx;
    btn.innerHTML = `<span class="badge">${slot + 1}</span>${rocketSVG(ROCKETS[rIdx])}`;
    optWrap.appendChild(btn);
  });

  speak('Which rocket looks like this?');
  setTimeout(() => { inputLocked = false; }, 400);
}

function tileAt(slot) {
  return document.querySelector(`.opt[data-slot="${slot}"]`);
}

// Clone the tapped option's rocket and fly it up to overlap the target.
// Calls onArrive(ctx) once it lands, where ctx = { clone, dx, dy, scale }.
function flyToTarget(tile, onArrive) {
  const svg = tile.querySelector('svg');
  const targetEl = document.getElementById('target');
  targetEl.classList.add('paused');                 // stop the bob so the landing is stable
  const from = svg.getBoundingClientRect();
  const to   = targetEl.querySelector('svg').getBoundingClientRect();

  const clone = svg.cloneNode(true);
  clone.classList.add('flyer');
  clone.style.left   = from.left + 'px';
  clone.style.top    = from.top + 'px';
  clone.style.width  = from.width + 'px';
  clone.style.height = 'auto';
  document.body.appendChild(clone);
  tile.style.visibility = 'hidden';

  const dx = (to.left + to.width / 2) - (from.left + from.width / 2);
  const dy = (to.top + to.height / 2) - (from.top + from.height / 2);
  const scale = to.width / from.width;

  clone.style.transition = 'transform 0.5s cubic-bezier(.5,0,.3,1)';
  requestAnimationFrame(() => {
    clone.style.transform = `translate(${dx}px, ${dy}px) scale(${scale})`;
  });
  setTimeout(() => onArrive({ clone, dx, dy, scale }), 520);
}

function correctLaunch(ctx) {
  document.getElementById('target').classList.add('hidden');   // hide the underlying target
  document.querySelectorAll('.opt.hint').forEach(el => el.classList.remove('hint'));

  // Ignition wobble + blip, then blast off-screen.
  ctx.clone.classList.add('ignite');
  playTone(110, 0.35, 'sawtooth', 0.25);
  setTimeout(() => {
    const liftY = ctx.dy - window.innerHeight * 1.3;
    ctx.clone.style.transition = 'transform 1.15s cubic-bezier(.45,0,.75,.25)';
    ctx.clone.style.transform = `translate(${ctx.dx}px, ${liftY}px) scale(${ctx.scale})`;
    playLaunch();
    score++;
    document.getElementById('score').textContent = score;
    speak(randomPraise());
    if (score % 5 === 0) { setTimeout(() => { spawnConfetti(80); playCelebration(); }, 250); }
    else spawnConfetti(24);
  }, 420);

  setTimeout(() => { ctx.clone.remove(); nextRound(); }, 420 + 1250);
}

function wrongReturn(ctx, tile) {
  wrongCount++;
  playTone(196, 0.3, 'sine', 0.18);
  speak(wrongCount === 1 ? 'Try again!' : 'This one!');
  document.getElementById('target').classList.remove('paused');

  // Fly the clone back to its slot, then restore the tile.
  ctx.clone.style.transition = 'transform 0.4s ease-in';
  ctx.clone.style.transform = 'translate(0, 0) scale(1)';
  setTimeout(() => {
    ctx.clone.remove();
    tile.style.visibility = 'visible';
    tile.classList.add('wrong-pick');
    setTimeout(() => tile.classList.remove('wrong-pick'), 450);
    if (wrongCount >= 2) tileAt(correctSlot).classList.add('hint');   // reveal answer after 2nd miss
    inputLocked = false;
  }, 420);
}

function handleSlot(slot) {
  if (inputLocked) return;
  if (!Number.isInteger(slot) || slot < 0 || slot >= optionCount) return;
  inputLocked = true;
  const tile = tileAt(slot);
  const isRight = slot === correctSlot;
  flyToTarget(tile, ctx => {
    if (isRight) correctLaunch(ctx);
    else wrongReturn(ctx, tile);
  });
}

document.getElementById('options').addEventListener('pointerdown', e => {
  const tile = e.target.closest('.opt');
  if (!tile) return;
  handleSlot(parseInt(tile.dataset.slot, 10));
});

document.addEventListener('keydown', e => {
  if (e.repeat || e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key.length !== 1) return;
  const n = parseInt(e.key, 10);
  if (Number.isNaN(n)) return;
  handleSlot(n - 1);   // key "1" → slot 0
});

// ── Start ────────────────────────────────────────────────────────────────
function startGame() {
  if (started) return;
  started = true;
  getAudio();
  nextRound();
}
// Auto-start; unlock audio on first user gesture (autoplay policy)
window.addEventListener('pointerdown', () => getAudio(), { once: true });
startGame();
</script>
